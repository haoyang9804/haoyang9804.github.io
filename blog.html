<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog - Haoyang Ma</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-light.min.css" />

    <style>
        :root {
            --paper: #f3e5be;
            --paper-light: #fff8e6;
            --paper-deep: #e4c989;
            --ink: #2f281f;
            --muted: #74624b;
            --line: rgba(88, 63, 34, 0.18);
            --accent: #6d4418;
            --accent-soft: rgba(141, 93, 31, 0.12);
            --shadow: 0 24px 60px rgba(74, 52, 22, 0.15);
            --serif: "Fraunces", Georgia, serif;
            --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        }

        * {
            box-sizing: border-box;
        }

        html {
            background: var(--paper);
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: var(--sans);
            background:
                radial-gradient(circle at 12% 8%, rgba(255, 250, 229, 0.82), transparent 26rem),
                linear-gradient(145deg, rgba(255, 250, 232, 0.6), rgba(225, 196, 132, 0.34)),
                var(--paper);
            -webkit-font-smoothing: antialiased;
        }

        a {
            color: var(--accent);
            font-weight: 700;
            text-decoration-thickness: 1px;
            text-underline-offset: 0.18em;
        }

        .page {
            width: min(1180px, calc(100% - 36px));
            margin: 0 auto;
            padding: 36px 0 56px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 34px;
        }

        .home {
            color: var(--muted);
            font-weight: 700;
            text-decoration: none;
        }

        .mode-tabs,
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            min-height: 36px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 248, 224, 0.72);
            color: var(--ink);
            cursor: pointer;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            transition: transform 140ms ease, background 140ms ease;
        }

        button:hover {
            background: var(--paper-light);
            transform: translateY(-1px);
        }

        button.active {
            background: var(--ink);
            color: var(--paper-light);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 760px) minmax(240px, 1fr);
            gap: 34px;
            align-items: end;
            margin-bottom: 28px;
        }

        h1 {
            margin: 0;
            font-family: var(--serif);
            font-size: clamp(3.1rem, 8vw, 6.2rem);
            font-weight: 650;
            letter-spacing: 0;
            line-height: 0.94;
        }

        .lede {
            max-width: 640px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.7;
        }

        .stats {
            display: grid;
            gap: 10px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: rgba(255, 248, 224, 0.62);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            color: var(--muted);
            font-size: 0.93rem;
        }

        .stat strong {
            color: var(--ink);
        }

        .workspace {
            display: grid;
            grid-template-columns: 270px minmax(0, 1fr);
            gap: 18px;
            align-items: stretch;
        }

        .sidebar,
        .editor-shell,
        .reader {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 248, 224, 0.76);
            box-shadow: var(--shadow);
        }

        .sidebar {
            min-height: 640px;
            padding: 18px;
        }

        .sidebar h2 {
            margin: 0 0 16px;
            font-family: var(--serif);
            font-size: 1.55rem;
            font-weight: 650;
        }

        .draft-list {
            display: grid;
            gap: 10px;
        }

        .draft-card {
            width: 100%;
            height: auto;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
        }

        .draft-card span {
            display: block;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
            line-height: 1.45;
        }

        .editor-shell {
            min-width: 0;
            overflow: hidden;
        }

        .editor-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        .title-input {
            width: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--ink);
            font-family: var(--serif);
            font-size: clamp(1.75rem, 4vw, 2.7rem);
            font-weight: 650;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            min-height: 640px;
        }

        .pane {
            min-width: 0;
        }

        .pane + .pane {
            border-left: 1px solid var(--line);
        }

        textarea {
            width: 100%;
            height: 100%;
            min-height: 640px;
            padding: 24px;
            border: 0;
            outline: 0;
            resize: vertical;
            background: rgba(255, 252, 240, 0.54);
            color: var(--ink);
            font-family: var(--mono);
            font-size: 0.95rem;
            line-height: 1.72;
        }

        .preview {
            height: 100%;
            min-height: 640px;
            padding: 28px;
            overflow: auto;
            background: rgba(255, 248, 224, 0.5);
        }

        .reader {
            display: none;
            max-width: 820px;
            margin: 0 auto;
            padding: clamp(28px, 6vw, 58px);
        }

        .reader.active {
            display: block;
        }

        .workspace.hidden {
            display: none;
        }

        .article,
        .preview {
            font-size: 1.05rem;
            line-height: 1.78;
        }

        .article h1,
        .preview h1 {
            margin: 0 0 18px;
            font-family: var(--serif);
            font-size: clamp(2.4rem, 6vw, 4.4rem);
            line-height: 1.04;
        }

        .article h2,
        .preview h2 {
            margin: 2.1em 0 0.6em;
            font-family: var(--serif);
            font-size: 1.75rem;
            line-height: 1.18;
        }

        .article h3,
        .preview h3 {
            margin: 1.7em 0 0.5em;
            font-size: 1.18rem;
        }

        .article p,
        .preview p {
            margin: 0 0 1.1em;
        }

        .article blockquote,
        .preview blockquote {
            margin: 1.6em 0;
            padding: 0.2em 0 0.2em 1.1em;
            border-left: 3px solid var(--accent);
            color: var(--muted);
        }

        .article code,
        .preview code {
            font-family: var(--mono);
            font-size: 0.92em;
        }

        .article :not(pre) > code,
        .preview :not(pre) > code {
            padding: 0.12em 0.34em;
            border: 1px solid rgba(88, 63, 34, 0.16);
            border-radius: 6px;
            background: rgba(109, 68, 24, 0.08);
        }

        .article pre,
        .preview pre {
            overflow: auto;
            margin: 1.4em 0;
            padding: 18px;
            border: 1px solid rgba(88, 63, 34, 0.14);
            border-radius: 12px;
            background: #fffaf0;
        }

        .article img,
        .preview img {
            max-width: 100%;
            border-radius: 12px;
        }

        .article table,
        .preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.4em 0;
        }

        .article th,
        .article td,
        .preview th,
        .preview td {
            padding: 10px 12px;
            border: 1px solid var(--line);
            text-align: left;
        }

        .status {
            color: var(--muted);
            font-size: 0.86rem;
            font-weight: 700;
            white-space: nowrap;
        }

        @media (max-width: 980px) {
            .hero,
            .workspace {
                grid-template-columns: 1fr;
            }

            .sidebar {
                min-height: auto;
            }

            .editor-grid {
                grid-template-columns: 1fr;
            }

            .pane + .pane {
                border-left: 0;
                border-top: 1px solid var(--line);
            }
        }

        @media (max-width: 680px) {
            .topbar,
            .editor-head {
                align-items: flex-start;
                flex-direction: column;
            }

            textarea,
            .preview,
            .editor-grid {
                min-height: 460px;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header class="topbar">
            <a class="home" href="./index.html">Back home</a>
            <div class="mode-tabs" role="tablist" aria-label="Blog mode">
                <button id="readTab" class="active" type="button">Read</button>
                <button id="writeTab" type="button">Write</button>
            </div>
        </header>

        <section class="hero">
            <div>
                <h1>Blog</h1>
                <p class="lede">A small writing room for notes that start as Markdown and can grow into publishable
                    posts.</p>
            </div>
            <aside class="stats" aria-label="Draft statistics">
                <div class="stat"><span>Draft</span><strong id="draftName">Research note</strong></div>
                <div class="stat"><span>Words</span><strong id="wordCount">0</strong></div>
                <div class="stat"><span>Saved</span><strong id="saveStatus">Local</strong></div>
            </aside>
        </section>

        <article id="reader" class="reader active">
            <div id="readerContent" class="article"></div>
        </article>

        <section id="workspace" class="workspace hidden" aria-label="Blog editor">
            <aside class="sidebar">
                <h2>Drafts</h2>
                <div class="draft-list">
                    <button class="draft-card active" type="button" data-draft="research-note">
                        Research note
                        <span>Markdown, code, and math</span>
                    </button>
                </div>
            </aside>

            <div class="editor-shell">
                <div class="editor-head">
                    <input id="titleInput" class="title-input" value="Research note" aria-label="Post title" />
                    <div class="toolbar">
                        <button id="exportButton" type="button">Export .md</button>
                        <button id="copyButton" type="button">Copy HTML</button>
                        <button id="resetButton" type="button">Reset</button>
                    </div>
                </div>
                <div class="editor-grid">
                    <div class="pane">
                        <textarea id="markdownInput" spellcheck="true" aria-label="Markdown editor"></textarea>
                    </div>
                    <div class="pane">
                        <div id="preview" class="preview article"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script>
        const storageKey = "haoyang-blog-draft-v1";
        const defaultDraft = `# Research note

This is a local Markdown draft. The page keeps the text in browser storage, so it is comfortable for rough notes before committing a real post.

## Code

\`\`\`python
def temperature(logits, tau=0.8):
    return logits / tau
\`\`\`

## Math

Inline math works: $p(x)=\\frac{1}{Z}\\exp(-E(x))$.

Block math works too:

$$
\\nabla_\\theta J(\\theta) =
\\mathbb{E}_{x \\sim \\pi_\\theta}[R(x)\\nabla_\\theta \\log \\pi_\\theta(x)]
$$

## Notes

- Keep the raw Markdown.
- Export when the draft is worth keeping in git.
- Paste images as links for now.
`;

        const titleInput = document.getElementById("titleInput");
        const markdownInput = document.getElementById("markdownInput");
        const preview = document.getElementById("preview");
        const reader = document.getElementById("reader");
        const readerContent = document.getElementById("readerContent");
        const workspace = document.getElementById("workspace");
        const readTab = document.getElementById("readTab");
        const writeTab = document.getElementById("writeTab");
        const wordCount = document.getElementById("wordCount");
        const saveStatus = document.getElementById("saveStatus");
        const draftName = document.getElementById("draftName");

        marked.setOptions({
            breaks: true,
            gfm: true
        });

        function loadDraft() {
            const saved = localStorage.getItem(storageKey);
            if (!saved) {
                return { title: "Research note", markdown: defaultDraft };
            }

            try {
                return JSON.parse(saved);
            } catch (error) {
                return { title: "Research note", markdown: defaultDraft };
            }
        }

        function renderMarkdown(markdown) {
            const rawHtml = marked.parse(markdown);
            const cleanHtml = DOMPurify.sanitize(rawHtml);
            preview.innerHTML = cleanHtml;
            readerContent.innerHTML = cleanHtml;

            [preview, readerContent].forEach(function (root) {
                root.querySelectorAll("pre code").forEach(function (block) {
                    hljs.highlightElement(block);
                });
                renderMathInElement(root, {
                    delimiters: [
                        { left: "$$", right: "$$", display: true },
                        { left: "$", right: "$", display: false },
                        { left: "\\(", right: "\\)", display: false },
                        { left: "\\[", right: "\\]", display: true }
                    ],
                    throwOnError: false
                });
            });
        }

        function countWords(markdown) {
            const text = markdown
                .replace(/```[\s\S]*?```/g, " ")
                .replace(/`[^`]*`/g, " ")
                .replace(/\$\$[\s\S]*?\$\$/g, " ")
                .replace(/[$#>*_\\-[\\]()]/g, " ")
                .trim();
            return text ? text.split(/\s+/).length : 0;
        }

        function saveDraft() {
            const draft = {
                title: titleInput.value.trim() || "Untitled",
                markdown: markdownInput.value
            };
            localStorage.setItem(storageKey, JSON.stringify(draft));
            draftName.textContent = draft.title;
            wordCount.textContent = String(countWords(draft.markdown));
            saveStatus.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            renderMarkdown(draft.markdown);
        }

        function setMode(mode) {
            const writing = mode === "write";
            workspace.classList.toggle("hidden", !writing);
            reader.classList.toggle("active", !writing);
            readTab.classList.toggle("active", !writing);
            writeTab.classList.toggle("active", writing);
        }

        function exportMarkdown() {
            const blob = new Blob([markdownInput.value], { type: "text/markdown;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            const filename = `${(titleInput.value || "post").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "post"}.md`;
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        }

        function copyHtml() {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(readerContent.innerHTML);
            } else {
                const scratch = document.createElement("textarea");
                scratch.value = readerContent.innerHTML;
                scratch.style.position = "fixed";
                scratch.style.opacity = "0";
                document.body.appendChild(scratch);
                scratch.focus();
                scratch.select();
                document.execCommand("copy");
                scratch.remove();
            }
            saveStatus.textContent = "Copied";
        }

        const draft = loadDraft();
        titleInput.value = draft.title;
        markdownInput.value = draft.markdown;
        saveDraft();

        titleInput.addEventListener("input", saveDraft);
        markdownInput.addEventListener("input", saveDraft);
        readTab.addEventListener("click", function () { setMode("read"); });
        writeTab.addEventListener("click", function () { setMode("write"); });
        document.getElementById("exportButton").addEventListener("click", exportMarkdown);
        document.getElementById("copyButton").addEventListener("click", copyHtml);
        document.getElementById("resetButton").addEventListener("click", function () {
            titleInput.value = "Research note";
            markdownInput.value = defaultDraft;
            saveDraft();
        });
    </script>
</body>

</html>
