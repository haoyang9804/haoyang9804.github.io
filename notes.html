<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notes - Haoyang Ma</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --paper: #f3e5be;
            --paper-light: #fff7df;
            --ink: #2f281f;
            --muted: #705f49;
            --line: rgba(88, 63, 34, 0.18);
            --accent: #6d4418;
            --serif: "Fraunces", Georgia, serif;
            --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
            font-family: var(--sans);
            line-height: 1.72;
            background:
                radial-gradient(circle at 10% 0%, rgba(255, 250, 229, 0.78), transparent 30rem),
                var(--paper);
        }

        a {
            color: var(--accent);
            font-weight: 700;
            text-decoration-thickness: 1px;
            text-underline-offset: 0.18em;
        }

        .page {
            width: min(820px, calc(100% - 36px));
            margin: 0 auto;
            padding: 42px 0 64px;
        }

        .back {
            display: inline-flex;
            margin-bottom: 46px;
            color: var(--muted);
            text-decoration: none;
        }

        h1 {
            margin: 0 0 16px;
            font-family: var(--serif);
            font-size: clamp(3rem, 8vw, 5.4rem);
            line-height: 0.98;
        }

        .lead {
            max-width: 660px;
            margin: 0 0 42px;
            color: var(--muted);
            font-size: 1.12rem;
        }

        .note-list {
            display: grid;
            gap: 14px;
        }

        .note {
            display: grid;
            gap: 6px;
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 248, 224, 0.72);
        }

        .note-title {
            font-family: var(--serif);
            font-size: 1.35rem;
            font-weight: 650;
        }

        .note p {
            margin: 0;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <main class="page">
        <a class="back" href="./index.html">Back home</a>
        <h1>Notes</h1>
        <p class="lead">Longer notes, course writeups, and the new blog workspace live here.</p>

        <section class="note-list" aria-label="Notes list">
            <article class="note">
                <a class="note-title" href="./blog.html">Blog workspace</a>
                <p>A local Markdown writing surface with preview, code highlighting, and math rendering.</p>
            </article>
            <article class="note">
                <a class="note-title" href="notes/logic4cs.pdf" target="_blank" rel="noopener">Logic for CS</a>
                <p>Course notes on logic for computer science.</p>
            </article>
        </section>
    </main>
</body>

</html>
